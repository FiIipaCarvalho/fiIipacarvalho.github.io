    <section class="section page-header"><div class="container">
        <h1 class="page-title">Publications</h1>
        <p class="page-subtitle">Automatically updated from ORCID</p>
    </div></section>

    <section class="section"><div class="container">
        <div class="publications-controls">
            <div class="search-box">
                <input type="text" id="pub-search" placeholder="Search publications...">
            </div>
            
            <!-- Keyword Filters -->
            <div class="theme-filters">
                <button class="theme-filter-btn active" data-keyword="all">All Publications</button>
                <button class="theme-filter-btn" data-keyword="biological-carbon-pump">Biological Carbon Pump</button>
                <button class="theme-filter-btn" data-keyword="phytoplankton-dynamics">Phytoplankton Dynamics</button>
                <button class="theme-filter-btn" data-keyword="biophysical-interactions">Biophysical Interactions</button>
                <button class="theme-filter-btn" data-keyword="autonomous-systems">Autonomous Systems</button>
                <button class="theme-filter-btn" data-keyword="best-practices">Best Practices</button>
                <button class="theme-filter-btn" data-keyword="polar-ecosystems">Polar Ecosystems</button>
                <button class="theme-filter-btn" data-keyword="dataset">Dataset</button>
                <button class="theme-filter-btn" data-keyword="methods">Methods</button>
            </div>
            
            <div class="filter-buttons">
                <button class="filter-btn active" data-year="all">All Years</button>
                <div id="year-filters"></div>
            </div>
        </div>
        <div id="publications-list" class="publications-list">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading publications from ORCID...</p>
            </div>
        </div>
    </div></section>
