<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glider Deployments | Dr. Filipa Carvalho</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Leaflet CSS for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="site-title">Dr. Filipa Carvalho</h1>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="research.html">Research</a>
                <a href="publications.html">Publications</a>
                <a href="projects.html">Projects</a>
                <a href="fieldwork-map.html" class="active">Glider Map</a>
                <a href="people.html">People</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>
    
    <main class="main">
        <div class="container">
            <h1 class="page-title">Autonomous Glider Deployments</h1>
            <p class="page-subtitle">Interactive map of ocean glider tracks from biogeochemical research projects</p>
            
            <!-- Filter Controls -->
            <div class="map-controls">
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="region-filter">Region</label>
                        <select id="region-filter">
                            <option value="all">All Regions</option>
                            <option value="Labrador Sea">Labrador Sea</option>
                            <option value="Iceland Basin">Iceland Basin</option>
                            <option value="West Antarctic Peninsula">West Antarctic Peninsula</option>
                            <option value="Southern Ocean">Southern Ocean</option>
                            <option value="South Georgia">South Georgia</option>
                            <option value="North Atlantic (PAP)">North Atlantic (PAP)</option>
                            <option value="Benguela">Benguela</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="project-filter">Project</label>
                        <select id="project-filter">
                            <option value="all">All Projects</option>
                            <option value="ReBELS">ReBELS</option>
                            <option value="BIO">BIO-CARBON</option>
                            <option value="CUSTARD">CUSTARD</option>
                            <option value="POLOMINTS">POLOMINTS</option>
                            <option value="GOCART">GOCART</option>
                        </select>
                    </div>
                </div>
                
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="date-min">Start Date</label>
                        <input type="date" id="date-min">
                    </div>
                    
                    <div class="filter-group">
                        <label for="date-max">End Date</label>
                        <input type="date" id="date-max">
                    </div>
                </div>
                
                <div class="filter-buttons">
                    <button onclick="applyFilters()" class="btn-primary">Apply Filters</button>
                    <button onclick="resetFilters()" class="btn-secondary">Reset</button>
                </div>
            </div>
            
            <!-- Map Container -->
            <div id="glider-map"></div>
            
            <!-- Legend -->
            <div class="map-legend">
                <h4>Legend</h4>
                <div id="legend-content"></div>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Dr. Filipa Carvalho</p>
            </div>
        </div>
    </footer>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <!-- Map functionality -->
    <script src="js/glider-map.js"></script>
</body>
</html>
